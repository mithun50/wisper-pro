name: wisper_pro
description: Video to SRT caption generator using Whisper AI
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  whisper_flutter_new: ^1.0.1
  ffmpeg_kit_flutter_new: ^4.1.0
  file_picker: ^8.0.0
  path_provider: ^2.1.0
  share_plus: ^9.0.0
  permission_handler: ^11.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
